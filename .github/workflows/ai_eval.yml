name: AI Agent Evaluation & Benchmarking CI/CD Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run Pytest Unit Tests
      run: |
        pytest tests/ -v

    - name: Run Regression Gate Check
      run: |
        # Run the solution module checks or trigger the benchmark runner
        python solution/solution.py
